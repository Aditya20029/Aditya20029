<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 240" width="1200" height="240" role="img" aria-label="Aditya Velpula. AI Engineer. RAG and LLM Systems. 5x AWS Certified.">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D1117"/>
      <stop offset="55%" stop-color="#1F2937"/>
      <stop offset="100%" stop-color="#1E3A8A"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#58A6FF"/>
      <stop offset="50%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#22D3EE"/>
    </linearGradient>
    <radialGradient id="glow" cx="20%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#58A6FF" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#58A6FF" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#58A6FF" stroke-opacity="0.06" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="240" fill="url(#bg)"/>
  <rect width="1200" height="240" fill="url(#grid)"/>
  <rect width="1200" height="240" fill="url(#glow)"/>

  <g opacity="0.5">
    <circle cx="1050" cy="60" r="3" fill="#58A6FF"/>
    <circle cx="1100" cy="120" r="2" fill="#22D3EE"/>
    <circle cx="980" cy="180" r="2.5" fill="#8B5CF6"/>
    <circle cx="1140" cy="200" r="2" fill="#58A6FF"/>
    <circle cx="900" cy="40" r="2" fill="#22D3EE"/>
    <circle cx="850" cy="200" r="2" fill="#8B5CF6"/>
  </g>

  <g transform="translate(60, 70)">
    <text x="0" y="0" font-family="Segoe UI, system-ui, -apple-system, sans-serif" font-size="56" font-weight="800" fill="#FFFFFF" letter-spacing="-1">Aditya Velpula</text>
    <rect x="0" y="18" width="220" height="4" rx="2" fill="url(#accent)"/>
    <text x="0" y="60" font-family="Segoe UI, system-ui, -apple-system, sans-serif" font-size="20" font-weight="500" fill="#C9D1D9">AI Engineer  •  RAG and LLM Systems  •  5x AWS Certified</text>
    <text x="0" y="92" font-family="Consolas, Monaco, monospace" font-size="15" fill="#58A6FF">$ M.S. Data Analytics, George Mason University, May 2026</text>
  </g>

  <g transform="translate(980, 110)" opacity="0.85">
    <g fill="none" stroke="#58A6FF" stroke-width="1.5">
      <circle cx="60" cy="0" r="6"/>
      <circle cx="120" cy="0" r="6"/>
      <circle cx="0" cy="0" r="6"/>
      <line x1="6" y1="0" x2="54" y2="0"/>
      <line x1="66" y1="0" x2="114" y2="0"/>
      <line x1="30" y1="-30" x2="60" y2="-6"/>
      <line x1="90" y1="-30" x2="60" y2="-6"/>
      <line x1="30" y1="30" x2="60" y2="6"/>
      <line x1="90" y1="30" x2="60" y2="6"/>
      <circle cx="30" cy="-30" r="5" fill="#8B5CF6" fill-opacity="0.4"/>
      <circle cx="90" cy="-30" r="5" fill="#22D3EE" fill-opacity="0.4"/>
      <circle cx="30" cy="30" r="5" fill="#22D3EE" fill-opacity="0.4"/>
      <circle cx="90" cy="30" r="5" fill="#8B5CF6" fill-opacity="0.4"/>
    </g>
  </g>
